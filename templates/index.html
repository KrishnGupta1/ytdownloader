<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #ff0000; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ff0000; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        button:hover { background: #cc0000; }
    </style>
</head>
<body>
    <div class="box">
        <h2>YouTube Downloader</h2>
        <form action="/download" method="POST">
            <input type="text" name="url" placeholder="YouTube Link Yahan Daalein" required>
            <select name="format">
                <option value="video">Video (MP4 - High Quality)</option>
                <option value="audio">Audio (MP3)</option>
            </select>
            <button type="submit">Download Now</button>
        </form>
    </div>
</body>
</html>
